<!doctype html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    </head>

    <body>
        <a-scene embedded arjs>
            <a-assets>
                <a-asset-item
                    id="bread-asset"
                    src="assets/asset1.glb"
                ></a-asset-item>
            </a-assets>

            <a-marker
                id="bread-marker"
                type="pattern"
                url="assets/marker1.patt"
            >
                <a-entity
                    id="bread"
                    gltf-model="#bread-asset"
                    scale="0.5 0.5 0.5"
                ></a-entity>
            </a-marker>
            <a-marker
                id="png-marker"
                type="pattern"
                url="assets/marker2.patt"
            >
                <a-image
                    id = "horse"
                    src="assets/asset2.png"
                    rotation="-90 0 0"
                    scale = "5 2 2" 
                ></a-image>
            </a-marker>
            <a-entity camera></a-entity>
        </a-scene>
    </body>
</html>
